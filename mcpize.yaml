# MCPize manifest - https://mcpize.com
version: 1
name: bharath-mcp
description: Bharath MCP — Indian Stock Market MCP Server with 32 tools for NSE/BSE stock data, portfolio tracking, AI-powered screening, options chain, FII/DII flows, candlestick patterns, news sentiment, and more. Zero setup, free tier available.
author: TRIKAAL
license: MIT
runtime: python
entry: http_server.py
build:
  install: pip install -r requirements.txt
startCommand:
  type: sse
  command: python
  args:
    - http_server.py
tags:
  - india
  - stock-market
  - nse
  - bse
  - trading
  - investment
  - portfolio
  - options
  - fii-dii
  - mutual-funds
  - crypto
pricing:
  free:
    requests_per_day: 100
    price: 0
  pro:
    requests_per_day: 10000
    price: 999
    currency: INR
    period: month
  enterprise:
    requests_per_day: unlimited
    price: 2499
    currency: INR
    period: month
